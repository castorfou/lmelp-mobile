name: 🐳 Build and Publish Export Image

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile.export'
      - 'scripts/docker_export_and_push.sh'
      - 'scripts/export_mongo_to_sqlite.py'
      - 'pyproject.toml'
      - '.github/workflows/build-export-image.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Dockerfile.export'
      - 'scripts/docker_export_and_push.sh'
      - 'scripts/export_mongo_to_sqlite.py'
      - 'pyproject.toml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lmelp-mobile-export

jobs:
  build-and-push:
    name: 🏗️ Build and Push Export Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr,prefix=pr-
            type=sha,prefix=sha-

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.export
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: ✅ Image published
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Export image published to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
